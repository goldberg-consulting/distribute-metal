[project]
name = "distribute-metal"
version = "0.1.0"
description = "Transparent distributed training across Apple Silicon Macs using Metal and MCCL"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.5.0",
    "mccl>=0.3.0",
]

[project.optional-dependencies]
dev = ["pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/distribute_metal"]
